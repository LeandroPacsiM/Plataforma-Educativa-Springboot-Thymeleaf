<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<nav th:fragment="navbar" class="site-nav">
    <!-- Styles moved to /static/css/components.css -->

    <div class="site-nav__inner">
        <a href="/" class="site-nav__brand" aria-label="Ir al inicio de Plataforma Educativa">
            <span class="site-nav__mark">P</span>
            <span class="site-nav__text">
                <span class="site-nav__title">Plataforma</span>
                <span class="site-nav__subtitle">Aprende a tu ritmo</span>
            </span>
        </a>

        <input class="site-nav__toggle" type="checkbox" id="site-nav-toggle">
        <label class="site-nav__burger" for="site-nav-toggle" aria-label="Abrir o cerrar menú">
            <span></span>
            <span></span>
            <span></span>
        </label>

        <div class="site-nav__panel">
            <div class="site-nav__links">
                <a href="/" class="site-nav__link">Inicio</a>

                <div sec:authorize="isAuthenticated()">
                    <a href="/home" class="site-nav__link">Panel</a>
                </div>

                <div sec:authorize="hasRole('ADMIN')">
                    <a href="/admin" class="site-nav__link">Admin</a>
                </div>
            </div>

            <div sec:authorize="!isAuthenticated()">
                <a th:href="@{/oauth2/authorization/google}" class="site-nav__button">Acceder</a>
            </div>

            <div sec:authorize="isAuthenticated()" class="site-nav__auth">
                <span class="site-nav__chip">
                    <span class="site-nav__avatar" aria-hidden="true">U</span>
                    <span class="site-nav__username" sec:authentication="name"></span>
                </span>

                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="site-nav__logout">Cerrar sesión</button>
                </form>
            </div>
        </div>
    </div>
</nav>

</html>
